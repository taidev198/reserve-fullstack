server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: warehouse-backend-file-logs
    static_configs:
      - targets:
          - localhost
        labels:
          app: warehouse-backend
          __path__: /var/log/warehouse/*.log
