spring:
  application:
    name: warehouse-reservation
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/warehouse}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      port: ${REDIS_PORT:6379}
      host: ${REDIS_HOST:localhost}
      password: ${REDIS_MASTER_PASS:123456}
      timeout: 2s

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

logging:
  file:
    name: ${APP_LOG_FILE:logs/warehouse-reservation.log}
  level:
    com.cmc.warehouse: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,circuitbreakerevents,ratelimiters,ratelimiterevents
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  stock:
    reconcile-interval-ms: ${STOCK_RECONCILE_INTERVAL_MS:60000}
  reservation:
    pending-cleanup:
      cron: ${PENDING_RESERVATION_CLEANUP_CRON:0 */1 * * * *}
      zone: ${PENDING_RESERVATION_CLEANUP_ZONE:UTC}
      ttl-seconds: ${PENDING_RESERVATION_TTL_SECONDS:900}
      batch-size: ${PENDING_RESERVATION_CLEANUP_BATCH_SIZE:200}

resilience4j:
  circuitbreaker:
    instances:
      reservationOps:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - java.lang.IllegalStateException
          - org.springframework.dao.DataAccessException
          - org.springframework.data.redis.RedisConnectionFailureException
          - org.springframework.dao.QueryTimeoutException
          - org.springframework.transaction.TransactionTimedOutException
  ratelimiter:
    instances:
      reservationApi:
        limit-for-period: ${RESERVATION_RATE_LIMIT_FOR_PERIOD:50}
        limit-refresh-period: ${RESERVATION_RATE_LIMIT_REFRESH_PERIOD:1s}
        timeout-duration: ${RESERVATION_RATE_LIMIT_TIMEOUT:0ms}
